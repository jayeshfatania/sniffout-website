<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="canonical" href="{{ .Permalink }}">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | Sniffout{{ end }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

<!-- Open Graph -->
<meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }}{{ end }}">
<meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="{{ "css/main.css" | relURL }}">

<!-- Google Analytics 4 -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-B1GQG1KWD3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-B1GQG1KWD3');

  // Beta source tracking
  (function() {
    var params = new URLSearchParams(window.location.search);
    var src = params.get('src');
    if (src) {
      gtag('set', 'user_properties', { 'traffic_source': src });
      try { sessionStorage.setItem('sniffout_src', src); } catch(e) {}
    } else {
      try {
        var stored = sessionStorage.getItem('sniffout_src');
        if (stored) { gtag('set', 'user_properties', { 'traffic_source': stored }); }
      } catch(e) {}
    }
  })();
</script>
